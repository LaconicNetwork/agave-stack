# Biscayne Solana Validator deployment spec
# Host: biscayne.vaasl.io (186.233.184.235)
# Identity: 9gpFgMABtfeDXdscLB7PK4me4NcZ8tB8aJNS8PABoTR3
stack: /srv/deployments/agave-stack/stack-orchestrator/stacks/agave
deploy-to: k8s-kind
image-registry: localhost:5001
kind-mount-root: /srv/kind
network:
  http-proxy:
    - host-name: biscayne.vaasl.io
      routes:
        - path: /
          proxy-to: agave-validator:8899
        - path: /
          proxy-to: agave-validator:8900
          websocket: true
  ports:
    agave-validator:
      - '8899'
      - '8900'
      - '8001'
      - 8001/udp
      - 9000/udp
      - 9001/udp
      - 9002/udp
      - 9003/udp
      - 9004/udp
      - 9005/udp
      - 9006/udp
      - 9007/udp
      - 9008/udp
      - 9009/udp
      - 9010/udp
      - 9011/udp
      - 9012/udp
      - 9013/udp
      - 9014/udp
      - 9015/udp
      - 9016/udp
      - 9017/udp
      - 9018/udp
      - 9019/udp
      - 9020/udp
      - 9021/udp
      - 9022/udp
      - 9023/udp
      - 9024/udp
      - 9025/udp
resources:
  containers:
    reservations:
      cpus: '4.0'
      memory: 256000M
    limits:
      cpus: '32.0'
      memory: 921600M
security:
  privileged: true
  unlimited-memlock: true
  capabilities:
    - IPC_LOCK
volumes:
  # Config volumes — on ZFS dataset (backed up via snapshots)
  validator-config: /srv/deployments/agave/data/validator-config
  doublezero-validator-identity: /srv/deployments/agave/data/validator-config
  doublezero-config: /srv/deployments/agave/data/doublezero-config
  # Heavy data volumes — on zvol/ramdisk (not backed up, rebuildable)
  validator-ledger: /srv/kind/solana/ledger
  validator-accounts: /srv/kind/solana/ramdisk/accounts
  validator-snapshots: /srv/kind/solana/snapshots
  validator-log: /srv/kind/solana/log
  # Monitoring
  monitoring-influxdb-data: /srv/kind/solana/monitoring/influxdb
  monitoring-grafana-data: /srv/kind/solana/monitoring/grafana
configmaps:
  monitoring-influxdb-init: stack-orchestrator/config/monitoring/influxdb-init
  monitoring-telegraf-config: stack-orchestrator/config/monitoring/telegraf-config
  monitoring-telegraf-scripts: stack-orchestrator/config/monitoring/scripts
  monitoring-grafana-datasources: stack-orchestrator/config/monitoring/grafana-datasources
  monitoring-grafana-dashboards: stack-orchestrator/config/monitoring/grafana-dashboards
config:
  # Node name for Grafana dashboard selector
  NODE_NAME: biscayne
  # Mode: 'rpc' (non-voting) — matches current biscayne systemd config
  AGAVE_MODE: rpc
  # Mainnet entrypoints — validator joins gossip directly with staked identity.
  # Probes at remote sites deliver additional shreds to the TVU port via
  # russula, supplementing turbine. Agave deduplicates natively.
  VALIDATOR_ENTRYPOINT: entrypoint.mainnet-beta.solana.com:8001
  EXTRA_ENTRYPOINTS: entrypoint2.mainnet-beta.solana.com:8001 entrypoint3.mainnet-beta.solana.com:8001 entrypoint4.mainnet-beta.solana.com:8001 entrypoint5.mainnet-beta.solana.com:8001
  # Known validators (Solana Foundation, Everstake, Chorus One)
  KNOWN_VALIDATOR: 7Np41oeYqPefeNQEHSv1UDhYrehxin3NStELsSKCT4K2
  EXTRA_KNOWN_VALIDATORS: GdnSyH3YtwcxFvQrVVJMm1JhTS4QVX7MFsX56uJLUfiZ dDzy5SR3AXdYWVqbDEkVFdvSPCtS9ihF5kJkHCtXoFs DE1bawNcRJB9rVm3buyMVfr8mBEoyyu73NBovf2oXJsJ CakcnaRDHka2gXyfbEd2d3xsvkJkqsLw2akB3zsN1D2S C1ocKDYMCm2ooWptMMnpd5VEB2Nx4UMJgRuYofysyzcA GwHH8ciFhR8vejWCqmg8FWZUCNtubPY2esALvy5tBvji 6WgdYhhGE53WrZ7ywJA15hBVkw7CRbQ8yDBBTwmBtAHN
  # Network — no BIND_ADDRESS. Agave auto-detects its public IP via ip_echo
  # (the SNAT rule makes outbound appear as the elastic IP 162.43.188.10).
  # Agave advertises that IP in gossip but binds sockets to 0.0.0.0.
  # Passing --bind-address forces agave to bind to that specific IP, which
  # must exist inside the pod — it doesn't (elastic IP is on the host).
  RPC_PORT: '8899'
  RPC_BIND_ADDRESS: 0.0.0.0
  GOSSIP_PORT: '8001'
  DYNAMIC_PORT_RANGE: 9000-10000
  # Cluster verification
  EXPECTED_GENESIS_HASH: 5eykt4UsFv8P8NJdTREpY1vzqKqZKvdpKuc147dw2N9d
  EXPECTED_SHRED_VERSION: '50093'
  # Storage — snapshots downloaded externally via aria2c (biscayne-recover.yml)
  NO_SNAPSHOTS: 'true'
  LIMIT_LEDGER_SIZE: '50000000'
  RUST_LOG: info,solana_metrics=warn
  SOLANA_METRICS_CONFIG: host=http://localhost:8086,db=agave_metrics,u=admin,p=admin
  # Jito MEV (NY region shred receiver) — disabled until voting enabled
  JITO_ENABLE: 'false'
  JITO_BLOCK_ENGINE_URL: https://mainnet.block-engine.jito.wtf
  JITO_SHRED_RECEIVER_ADDR: 141.98.216.96:1002
  JITO_TIP_PAYMENT_PROGRAM: T1pyyaTNZsKv2WcRAB8oVnk93mLJw2XzjtVYqCsaHqt
  JITO_DISTRIBUTION_PROGRAM: 4R3gSG8BpU4t19KYj8CfnbtRpnT8gtk4dvTHxVRwc2r7
  JITO_MERKLE_ROOT_AUTHORITY: 8F4jGUmxF36vQ6yabnsxX6AQVXdKBhs8kGSUuRKSg8Xt
  JITO_COMMISSION_BPS: '800'
  # DoubleZero
  DOUBLEZERO_RPC_ENDPOINT: http://127.0.0.1:8899
  # Memory caps — REQUIRED for biscayne. Default agave behaviour keeps
  # the entire accounts index in heap with no eviction path. On mainnet
  # the index reaches ~1.12B entries / ~120 GiB after snapshot load and
  # grows from there until the 921.6 GB pod cgroup OOM-kills the
  # validator (~46 min cycle observed 2026-04-30).
  #
  # Flags:
  # - --enable-accounts-disk-index switches the bucket-map holder to
  #   IndexLimitMb::Minimal (accounts-db/src/accounts_index.rs:232-237 in
  #   v3.1.10), keeping a small in-memory hot set and spilling the rest
  #   to a disk-backed index at ledger_path/accounts_index — on the ZFS
  #   ledger dataset, not the tmpfs ramdisk. This is the v3.x equivalent
  #   of v4.x's --accounts-index-limit; the size-tunable variant
  #   (Threshold(num_bytes)) was added in v4.0.0-alpha.0 (commit
  #   dbbd959064, 2026-01-13) and is NOT in v3.1.10.
  # - --accounts-db-cache-limit-mb 16384 explicitly caps the writeback
  #   cache (default unbounded; observed steady-state ~7 GiB but the
  #   lack of a ceiling is a footgun).
  #
  # Earlier commit 9afc074 used --accounts-index-limit 200GB which crash-
  # looped the pod on agave 3.1.10 ("Found argument '--accounts-index-limit'
  # which wasn't expected"). Corrected to the v3.x-correct flag here.
  #
  # DO NOT REMOVE — see infra/biscayne/CLAUDE.md "Memory configuration"
  # and the deletion of biscayne-update-agave-env.yml (laconic-tech-ops
  # commit b10cd20) for the drift pattern this guards against.
  EXTRA_ARGS: --enable-accounts-disk-index --accounts-db-cache-limit-mb 16384
