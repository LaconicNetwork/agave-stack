services:
  agave-validator:
    restart: unless-stopped
    image: laconicnetwork/agave:local
    network_mode: host
    privileged: true
    cap_add:
      - IPC_LOCK
    # Defaults are in start-validator.sh — compose just passes through.
    # Required vars (no default): VALIDATOR_ENTRYPOINT, KNOWN_VALIDATOR
    environment:
      AGAVE_MODE: ${AGAVE_MODE:-validator}
      VALIDATOR_ENTRYPOINT: ${VALIDATOR_ENTRYPOINT}
      KNOWN_VALIDATOR: ${KNOWN_VALIDATOR}
      EXTRA_ENTRYPOINTS: ${EXTRA_ENTRYPOINTS:-}
      EXTRA_KNOWN_VALIDATORS: ${EXTRA_KNOWN_VALIDATORS:-}
      RPC_PORT: ${RPC_PORT:-}
      RPC_BIND_ADDRESS: ${RPC_BIND_ADDRESS:-}
      GOSSIP_PORT: ${GOSSIP_PORT:-}
      DYNAMIC_PORT_RANGE: ${DYNAMIC_PORT_RANGE:-}
      EXPECTED_GENESIS_HASH: ${EXPECTED_GENESIS_HASH:-}
      EXPECTED_SHRED_VERSION: ${EXPECTED_SHRED_VERSION:-}
      LIMIT_LEDGER_SIZE: ${LIMIT_LEDGER_SIZE:-}
      NO_SNAPSHOTS: ${NO_SNAPSHOTS:-}
      SNAPSHOT_INTERVAL_SLOTS: ${SNAPSHOT_INTERVAL_SLOTS:-}
      MAXIMUM_SNAPSHOTS_TO_RETAIN: ${MAXIMUM_SNAPSHOTS_TO_RETAIN:-}
      VOTE_ACCOUNT_KEYPAIR: ${VOTE_ACCOUNT_KEYPAIR:-}
      GOSSIP_HOST: ${GOSSIP_HOST:-}
      PUBLIC_TVU_ADDRESS: ${PUBLIC_TVU_ADDRESS:-}
      RUST_LOG: ${RUST_LOG:-}
      SOLANA_METRICS_CONFIG: ${SOLANA_METRICS_CONFIG:-}
      JITO_ENABLE: ${JITO_ENABLE:-}
      JITO_BLOCK_ENGINE_URL: ${JITO_BLOCK_ENGINE_URL:-}
      JITO_RELAYER_URL: ${JITO_RELAYER_URL:-}
      JITO_SHRED_RECEIVER_ADDR: ${JITO_SHRED_RECEIVER_ADDR:-}
      JITO_TIP_PAYMENT_PROGRAM: ${JITO_TIP_PAYMENT_PROGRAM:-}
      JITO_DISTRIBUTION_PROGRAM: ${JITO_DISTRIBUTION_PROGRAM:-}
      JITO_MERKLE_ROOT_AUTHORITY: ${JITO_MERKLE_ROOT_AUTHORITY:-}
      JITO_COMMISSION_BPS: ${JITO_COMMISSION_BPS:-}
      EXTRA_ARGS: ${EXTRA_ARGS:-}
      NO_INCREMENTAL_SNAPSHOTS: ${NO_INCREMENTAL_SNAPSHOTS:-}
    volumes:
      - validator-config:/data/config
      - validator-ledger:/data/ledger
      - validator-accounts:/data/accounts
      - validator-snapshots:/data/snapshots
      - validator-log:/data/log
    ports:
      # RPC ports
      - "8899"
      - "8900"
      # Gossip port
      - "8001"
      - "8001/udp"
      # Dynamic port range for TPU/TVU/repair (9000-9025, 26 ports)
      - "9000/udp"
      - "9001/udp"
      - "9002/udp"
      - "9003/udp"
      - "9004/udp"
      - "9005/udp"
      - "9006/udp"
      - "9007/udp"
      - "9008/udp"
      - "9009/udp"
      - "9010/udp"
      - "9011/udp"
      - "9012/udp"
      - "9013/udp"
      - "9014/udp"
      - "9015/udp"
      - "9016/udp"
      - "9017/udp"
      - "9018/udp"
      - "9019/udp"
      - "9020/udp"
      - "9021/udp"
      - "9022/udp"
      - "9023/udp"
      - "9024/udp"
      - "9025/udp"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 1000000
        hard: 1000000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8899/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  validator-config:
  validator-ledger:
  validator-accounts:
  validator-snapshots:
  validator-log:
